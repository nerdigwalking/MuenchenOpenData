<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Münchner Parkhäuser – Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f2; color: #1a1a18; min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e5e4de; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 500; }
  header span { font-size: 13px; color: #888780; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric { background: #fff; border: 1px solid #e5e4de; border-radius: 10px; padding: 16px; }
  .metric-label { font-size: 12px; color: #888780; margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 500; }
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .card { background: #fff; border: 1px solid #e5e4de; border-radius: 12px; padding: 20px; }
  .card-title { font-size: 12px; font-weight: 500; color: #888780; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 14px; }
  #map { height: 380px; border-radius: 8px; border: 1px solid #e5e4de; }
  .chart-wrap { position: relative; height: 340px; }
  .full-card { background: #fff; border: 1px solid #e5e4de; border-radius: 12px; padding: 20px; }
  .search-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
  .search-row input, .search-row select { font-size: 14px; padding: 8px 12px; border: 1px solid #d3d1c7; border-radius: 8px; outline: none; background: #fafaf8; color: #1a1a18; }
  .search-row input { flex: 1; }
  .search-row input:focus, .search-row select:focus { border-color: #378ADD; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: #888780; border-bottom: 1px solid #e5e4de; padding: 8px 8px 10px; letter-spacing: 0.03em; text-transform: uppercase; }
  td { padding: 10px 8px; border-bottom: 1px solid #f0efea; color: #1a1a18; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }
  .table-wrap { max-height: 360px; overflow-y: auto; }
  .stars { color: #BA7517; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; }
  .badge-rated { background: #EAF3DE; color: #3B6D11; }
  .badge-none { background: #F1EFE8; color: #888780; }
  .table-footer { margin-top: 10px; font-size: 12px; color: #888780; }
  .legend { display: flex; gap: 14px; font-size: 12px; color: #888780; margin-bottom: 10px; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .popup-title { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
  .popup-addr { font-size: 12px; color: #888780; margin-bottom: 6px; }
  .popup-rating { font-size: 13px; }
  @media (max-width: 768px) {
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
    .main-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>

  <h1>Münchner Parkhäuser</h1>

<div class="container">

  <div class="metric-grid">
    <div class="metric">
      <div class="metric-label">Parkhäuser gesamt</div>
      <div class="metric-value" id="m-total">74</div>
    </div>
    <div class="metric">
      <div class="metric-label">Mit Bewertung</div>
      <div class="metric-value" id="m-rated">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Ø Bewertung</div>
      <div class="metric-value" id="m-avg">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Bestbewertet</div>
      <div class="metric-value" id="m-best">—</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div class="card-title">Karte aller Standorte</div>
      <div id="map"></div>
    </div>
    <div class="card">
      <div class="card-title">Top 10 nach Bewertung</div>

        <canvas id="topChart" role="img" aria-label="Horizontales Balkendiagramm der 10 best bewerteten Parkhäuser">Top-Parkhäuser.</canvas>
      </div>
    </div>
  </div>

  <div class="full-card">
    <div class="card-title">Alle Standorte</div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Name oder Straße suchen…" oninput="filterTable()">
      <select id="ratingFilter" onchange="filterTable()">

        <option value="rated">Nur bewertet</option>
        <option value="5">★ 5.0</option>
        <option value="4">★ 4.0+</option>
        <option value="3">★ 3.0+</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:38%">Name</th>
            <th style="width:30%">Adresse</th>
            <th style="width:16%">Koordinaten</th>
            <th style="width:16%">Bewertung</th>

        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="table-footer" id="tableCount"></div>
  </div>

</div>

const rated = places.filter(p => p.rating > 0);
const avgRating = rated.length ? (rated.reduce((s,p) => s+p.rating,0)/rated.length) : 0;
const topPlace = [...places].sort((a,b)=>b.rating-a.rating)[0];

document.getElementById('m-total').textContent = places.length;
document.getElementById('m-rated').textContent = rated.length + ' / ' + places.length;
document.getElementById('m-avg').textContent = avgRating.toFixed(2) + ' ★';
document.getElementById('m-best').textContent = topPlace ? topPlace.rating.toFixed(2) + ' ★' : '—';

const map = L.map('map').setView([48.155, 11.575], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

function markerColor(r) {
  if (r === 0) return '#888780';
  if (r >= 4.5) return '#1D9E75';
  if (r >= 3.5) return '#378ADD';
  return '#EF9F27';
}

places.forEach(p => {
  const color = markerColor(p.rating);
  const icon = L.divIcon({
    html: `<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>`,
    className: '',
    iconSize: [12,12],
    iconAnchor: [6,6]
  });
  const addr = p.street + (p.streetNumber ? ' ' + p.streetNumber : '');
  const ratingText = p.rating > 0 ? `<span style="color:#BA7517">${'★'.repeat(Math.round(p.rating))}${'☆'.repeat(5-Math.round(p.rating))}</span> ${p.rating.toFixed(2)}` : '<span style="color:#aaa">nicht bewertet</span>';
  L.marker([p.lat, p.lng], {icon})
    .addTo(map)
    .bindPopup(`<div class="popup-title">${p.title}</div><div class="popup-addr">${addr}</div><div class="popup-rating">${ratingText}</div>`);
});

const mapLegend = L.control({position:'bottomright'});
mapLegend.onAdd = () => {
  const d = L.DomUtil.create('div');
  d.innerHTML = `<div style="background:#fff;padding:10px 12px;border-radius:8px;border:1px solid #e5e4de;font-size:12px;color:#444;line-height:1.8">
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#1D9E75;margin-right:6px;vertical-align:middle"></span>≥ 4.5 ★</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#378ADD;margin-right:6px;vertical-align:middle"></span>3.5–4.4 ★</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#EF9F27;margin-right:6px;vertical-align:middle"></span>&lt; 3.5 ★</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#888780;margin-right:6px;vertical-align:middle"></span>keine Bewertung</div>
  </div>`;
  return d;
};
mapLegend.addTo(map);

const top10 = [...places].filter(p=>p.rating>0).sort((a,b)=>b.rating-a.rating).slice(0,10);
new Chart(document.getElementById('topChart'), {
  type: 'bar',
  data: {
    labels: top10.map(p => p.title.length>24 ? p.title.slice(0,22)+'…' : p.title),
    datasets: [{
      label: 'Bewertung',
      data: top10.map(p => p.rating),
      backgroundColor: top10.map(p => p.rating >= 4.5 ? '#1D9E75' : p.rating >= 3.5 ? '#378ADD' : '#EF9F27'),
      borderRadius: 4
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { min:0, max:5, ticks:{font:{size:11},color:'#888780'}, grid:{color:'rgba(0,0,0,0.06)'} },
      y: { ticks:{font:{size:11},color:'#444441'}, grid:{display:false} }
    }
  }
});

let filtered = [...places];
function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const rf = document.getElementById('ratingFilter').value;
  filtered = places.filter(p => {
    const matchText = p.title.toLowerCase().includes(q) || p.street.toLowerCase().includes(q);
    const r = p.rating;
    let matchR = true;
    if (rf==='rated') matchR = r>0;
    else if (rf==='5') matchR = r>=5;
    else if (rf==='4') matchR = r>=4;
    else if (rf==='3') matchR = r>=3;
    return matchText && matchR;
  });
  renderTable();
}

function starsHtml(r) {
  if (r===0) return '<span class="badge badge-none">keine</span>';
  const f = Math.round(r);
  return `<span class="stars">${'★'.repeat(f)}${'☆'.repeat(5-f)}</span> ${r.toFixed(2)}`;
}

function renderTable() {
  document.getElementById('tableBody').innerHTML = filtered.map(p => {
    const addr = p.street + (p.streetNumber ? ' ' + p.streetNumber : '');
    return `<tr>
      <td title="${p.title}">${p.title}</td>
      <td title="${addr}">${addr}</td>
      <td style="font-family:monospace;font-size:11px;color:#888780">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</td>
      <td>${starsHtml(p.rating)}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableCount').textContent = `${filtered.length} von ${places.length} Einträgen`;
}

renderTable();
</script>
</body>
</html>
